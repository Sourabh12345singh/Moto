# H2 In-Memory Database Configuration for isolated testing
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=sa

# JPA / Hibernate settings
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Disable schema SQL scripts to avoid overlap
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

# Stateless test JWT Key
jwt.secret=test-secret-key-test-secret-key-test-12345
jwt.expiration=60000

# Mock JavaMailSender
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test@motoshare.com
spring.mail.password=testpass