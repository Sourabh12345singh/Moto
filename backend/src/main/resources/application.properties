spring.application.name=MotoShare

# Database — compose JDBC URL from parts (Render provides individual properties)
# Locally: falls back to localhost defaults
spring.datasource.url=${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:Bike_}}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:2006}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
# Render PostgreSQL requires SSL — disable locally
spring.datasource.hikari.data-source-properties.sslmode=${DB_SSLMODE:disable}

spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

jwt.secret=${JWT_SECRET:motoshare-secret-key-motoshare-123456}
jwt.expiration=86400000

# Email (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:sourabh20092004@gmail.com}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# CORS — frontend URL (override in production)
frontend.url=${FRONTEND_URL:http://localhost:3000}

# Server port (Render injects PORT env var)
server.port=${PORT:8080}
