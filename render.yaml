# ============================================================
# Render Blueprint — MotoShare Deployment
# ============================================================
# Deploy: Push to GitHub, then go to https://dashboard.render.com
#         -> New -> Blueprint -> Select this repo
# Render reads this file and creates all services automatically.
# ============================================================

databases:
  - name: motoshare-db
    plan: free
    databaseName: motoshare
    user: motoshare_user

services:
  # ---- Spring Boot Backend ----
  - type: web
    name: motoshare-backend
    plan: free
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: motoshare-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: motoshare-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: motoshare-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: motoshare-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: motoshare-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: FRONTEND_URL
        value: https://motoshare-frontend-3s89.onrender.com
      - key: DB_SSLMODE
        value: require
      - key: SHOW_SQL
        value: "false"

  # ---- React Frontend (nginx) ----
  - type: web
    name: motoshare-frontend
    plan: free
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    envVars:
      - key: VITE_API_URL
        value: https://motoshare-backend.onrender.com/api
      - key: VITE_CLOUDINARY_CLOUD_NAME
        sync: false
      - key: VITE_CLOUDINARY_UPLOAD_PRESET
        sync: false
