name: MotoShare CI/CD Enterprise Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # Job 1: Build and Test Spring Boot Backend
  backend-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Test Backend (H2 Isolated Tests)
        run: |
          cd backend
          mvn clean test
        env:
          # Spring Boot picks up the active 'test' profile to run H2 database in-memory
          SPRING_PROFILES_ACTIVE: test

      - name: Package Backend JAR
        run: |
          cd backend
          mvn package -DskipTests

  # Job 2: Build and Lint React Frontend
  frontend-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Frontend Bundle
        run: |
          cd frontend
          npm run build
        env:
          VITE_API_URL: https://api.motoshare.example.com/api

  # Job 3: Docker Build Verification (Security & Release Preflight)
  docker-check:
    needs: [backend-ci, frontend-ci]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify Backend Docker Build
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false # Validate build without pushing to registry

      - name: Verify Frontend Docker Build
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
